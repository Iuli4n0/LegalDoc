sonar.projectKey=${SONAR_PROJECT_KEY}
sonar.organization=${SONAR_ORGANIZATION}

sonar.projectName=LegalDoc
sonar.projectVersion=1.0

sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclude test projects, migrations, and build output from analysis
sonar.exclusions=\
  **/bin/**,\
  **/obj/**,\
  **/Migrations/**,\
  **/wwwroot/**,\
  **/TestResults/**,\
  **/*.Test/**

# Coverage exclusions
sonar.coverage.exclusions=\
  **/*Test*/**,\
  **/*Tests*/**,\
  **/Migrations/**,\
  **/Program.cs,\
  **/obj/**,\
  **/bin/**

# Test project sources
sonar.tests=DocumentService.Test,IdentityService.Test
sonar.test.inclusions=**/*Tests.cs,**/*Test.cs

# Coverage report path (generated by dotnet-coverage)
sonar.cs.vscoveragexml.reportsPaths=coverage.xml

